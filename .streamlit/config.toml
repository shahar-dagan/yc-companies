# Global Streamlit config — used by chat.py and all pages/
# Theme aligned with utils.COLORS and dashboard zinc-dark palette.

[theme]
primaryColor = "#f97316"
backgroundColor = "#09090b"
secondaryBackgroundColor = "#18181b"
textColor = "#fafafa"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
